name: app_mineiro
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  #UI
  cupertino_icons: ^1.0.8
  flutter_easyloading: ^3.0.5
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10+1
  gap:
  pattern_formatter: ^3.0.0
  loading_animation_widget: ^1.2.1
  like_button: ^2.0.5
  syncfusion_flutter_datepicker: ^25.2.3
  video_player: ^2.8.6
  chewie: ^1.8.5
  font_awesome_flutter:



  #LOGIC
  go_router: ^14.1.0
  flutter_bloc:
  pocketbase: ^0.24.0
  intl: ^0.18.1





dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:

  uses-material-design: true

